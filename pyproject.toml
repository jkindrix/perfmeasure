[project]
name = "perf-lint"
version = "0.1.0"
description = "Static Big-O performance linter: flags likely-accidental O(n^2)+ code across languages"
requires-python = ">=3.10"
dependencies = [
    "tree-sitter>=0.23",
    "tree-sitter-python>=0.23",
]

[project.scripts]
perf-lint = "perf_lint.cli:main"

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/perf_lint"]
